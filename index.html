<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Denuncias VIF</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <div id="mensajeExito" class="oculto">Denuncia registrada con éxito ✅</div>

        <div id="loginSection">
            <h1>Acceso al Sistema</h1>
            <input type="text" id="username" placeholder="Nombre de usuario" required>
            <button id="btnLogin">Ingresar</button>
        </div>

        <div id="appSection" style="display: none;">
            <header>
                <h1>Gestión de Denuncias</h1>
                <button id="btnLogout" style="background:#dc3545; color:white;">Cerrar Sesión</button>
            </header>
            <form id="denunciaForm">
                <select id="tipoDenuncia" required>
                    <option value="">Seleccione el tipo de denuncia</option>
                    <option value="Violencia Física">Violencia Física</option>
                    <option value="Violencia Psicológica">Violencia Psicológica</option>
                </select>
                <span id="error-tipoDenuncia" class="mensaje-error"></span>

                <input type="text" id="nombre" placeholder="Nombre completo" required>
                <span id="error-nombre" class="mensaje-error"></span>

                <input type="email" id="email" placeholder="Correo electrónico" required>
                <span id="error-email" class="mensaje-error"></span>

                <textarea id="descripcion" placeholder="Descripción (min 10 caracteres)" required></textarea>
                <span id="error-descripcion" class="mensaje-error"></span>

                <button type="submit">Registrar Denuncia</button>
            </form>
            <section id="listaDenuncias"></section>
        </div>
    </main>
    <script type="module" src="js/main.js"></script>
</body>
</html>
